spring.application.name=api

app.ai.gms.api-key=${OPENAI_API_KEY:}
app.ai.gms.responses-url=${GMS_RESPONSES_URL:https://gms.ssafy.io/gmsapi/api.openai.com/v1/responses}
app.ai.chat.model=gpt-5-mini
app.ai.recommendation.model=gpt-5-mini
app.ai.analysis.model=gpt-5-mini

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/badamoyeo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:ssafy}
spring.datasource.password=${DB_PASSWORD:ssafy}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis.mapper-locations=classpath:/mappers/**/*.xml
mybatis.type-handlers-package=badamoyeo_api.config.mybatis
mybatis.configuration.map-underscore-to-camel-case=true

openapi.marine.service-key=${OPENAPI_MARINE_SERVICE_KEY:}
openapi.marine.ingestion.enabled=true
openapi.marine.ingestion.run-on-startup=true
openapi.marine.ingestion.cron=${OPENAPI_MARINE_INGESTION_CRON:0 10 0,6,12,18 * * *}

auth.jwt.secret=${JWT_SECRET:badamoyeo-local-development-secret-key-must-be-long-enough}
auth.jwt.access-token-minutes=${JWT_ACCESS_TOKEN_MINUTES:30}
auth.jwt.refresh-token-days=${JWT_REFRESH_TOKEN_DAYS:14}
auth.refresh-token-cookie.secure=${REFRESH_TOKEN_COOKIE_SECURE:false}
auth.oauth.success-redirect-uri=${OAUTH_SUCCESS_REDIRECT_URI:http://localhost:5173/oauth/callback}
auth.oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
auth.oauth.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
auth.oauth.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/auth/oauth/google/callback}
auth.oauth.kakao.client-id=${KAKAO_OAUTH_CLIENT_ID:}
auth.oauth.kakao.client-secret=${KAKAO_OAUTH_CLIENT_SECRET:}
auth.oauth.kakao.redirect-uri=${KAKAO_OAUTH_REDIRECT_URI:http://localhost:8080/auth/oauth/kakao/callback}
auth.oauth.naver.client-id=${NAVER_OAUTH_CLIENT_ID:}
auth.oauth.naver.client-secret=${NAVER_OAUTH_CLIENT_SECRET:}
auth.oauth.naver.redirect-uri=${NAVER_OAUTH_REDIRECT_URI:http://localhost:8080/auth/oauth/naver/callback}

app.upload.directory=uploads
app.upload.public-url-prefix=/uploads
app.upload.max-file-size-bytes=5242880
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.post.max-image-count=${POST_MAX_IMAGE_COUNT:5}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
